---
# Configure UFW — policies, rules, rate limits, forwarding, raw NAT

# ---- Reset to clean state on first run ----

- name: Check if UFW reset marker exists
  ansible.builtin.stat:
    path: /etc/ufw/.ansible-managed
  register: firewall_marker

- name: Reset UFW to defaults
  community.general.ufw:
    state: reset
  when: not firewall_marker.stat.exists or firewall_reset | default(false)

- name: Create managed marker
  ansible.builtin.copy:
    content: "Managed by Ansible firewall role\n"
    dest: /etc/ufw/.ansible-managed
    mode: "0644"
  when: not firewall_marker.stat.exists

# ---- Default policies ----

- name: Set default incoming policy
  community.general.ufw:
    direction: incoming
    default: "{{ firewall_default_incoming }}"

- name: Set default outgoing policy
  community.general.ufw:
    direction: outgoing
    default: "{{ firewall_default_outgoing }}"

- name: Set default routed policy
  community.general.ufw:
    direction: routed
    default: "{{ firewall_default_routed }}"

# ---- Port/service rules ----

- name: Apply firewall rules
  community.general.ufw:
    rule: "{{ item.rule }}"
    port: "{{ item.port | string }}"
    proto: "{{ item.proto | default('tcp') }}"
    from_ip: "{{ item.from | default('any') }}"
    to_ip: "{{ item.to | default('any') }}"
    # optional interface constraints
    interface_in: "{{ item.interface_in | default(omit) }}"
    interface_out: "{{ item.interface_out | default(omit) }}"
    comment: "{{ item.comment | default(omit) }}"
    delete: "{{ item.delete | default(omit) }}"
  loop: "{{ firewall_rules }}"
  loop_control:
    label: "{{ item.comment | default(item.port) }}"

# ---- Rate-limited rules ----

- name: Apply rate-limited rules
  community.general.ufw:
    rule: limit
    port: "{{ item.port | string }}"
    proto: "{{ item.proto | default('tcp') }}"
    # optional interface constraints
    interface_in: "{{ item.interface_in | default(omit) }}"
    interface_out: "{{ item.interface_out | default(omit) }}"
    comment: "{{ item.comment | default(omit) }}"
    delete: "{{ item.delete | default(omit) }}"
  loop: "{{ firewall_rate_limit_rules }}"
  loop_control:
    label: "{{ item.comment | default(item.port) }}"

# ---- Forwarding/route rules ----

- name: Apply route/forwarding rules
  community.general.ufw:
    rule: "{{ item.rule }}"
    route: true
    interface_in: "{{ item.interface_in | default(omit) }}"
    interface_out: "{{ item.interface_out | default(omit) }}"
    from_ip: "{{ item.from | default('any') }}"
    to_ip: "{{ item.to | default('any') }}"
    port: "{{ item.port | string if item.port is defined else omit }}"
    proto: "{{ item.proto | default(omit) }}"
    comment: "{{ item.comment | default(omit) }}"
    delete: "{{ item.delete | default(omit) }}"
  loop: "{{ firewall_route_rules }}"
  loop_control:
    label: "{{ item.comment | default('route rule') }}"

# ---- Raw NAT rules in before.rules ----

- name: Remove raw NAT block when no rules are defined
  ansible.builtin.blockinfile:
    path: /etc/ufw/before.rules
    marker: "# {mark} ANSIBLE MANAGED — firewall NAT"
    state: absent
  when: firewall_raw_rules | length == 0
  notify: Reload UFW

- name: Add raw NAT rules to before.rules
  ansible.builtin.blockinfile:
    path: /etc/ufw/before.rules
    insertbefore: "^\\*filter"
    marker: "# {mark} ANSIBLE MANAGED — firewall NAT"
    block: |
      *nat
      :POSTROUTING ACCEPT [0:0]
      {% for line in firewall_raw_rules %}
      {{ line }}
      {% endfor %}
      COMMIT
  when: firewall_raw_rules | length > 0
  notify: Reload UFW

# ---- Raw Filter rules in before.rules ----

- name: Remove raw filter block when no rules are defined
  ansible.builtin.blockinfile:
    path: /etc/ufw/before.rules
    marker: "# {mark} ANSIBLE MANAGED — firewall raw filters"
    state: absent
  when: firewall_raw_filter_rules | length == 0
  notify: Reload UFW

- name: Add raw filter rules to before.rules
  ansible.builtin.blockinfile:
    path: /etc/ufw/before.rules
    insertbefore: "^COMMIT"
    marker: "# {mark} ANSIBLE MANAGED — firewall raw filters"
    block: |
      {% for line in firewall_raw_filter_rules %}
      {{ line }}
      {% endfor %}
  when: firewall_raw_filter_rules | length > 0
  notify: Reload UFW

# ---- Logging ----

- name: Set logging level
  community.general.ufw:
    logging: "{{ firewall_logging }}"

# ---- Enable ----

- name: Enable UFW
  community.general.ufw:
    state: enabled
  when: firewall_enabled
